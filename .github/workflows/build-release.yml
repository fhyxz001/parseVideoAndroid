name: Build & Release APK

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

# actions/checkout@v4 等仍默认运行在已弃用的 Node.js 20 上，提前切换到 Node 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. 检出代码 ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # 拉取完整历史，用于生成 release notes

      # ── 2. 配置 JDK 17 ────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. 配置 Gradle（无需提交 gradle-wrapper.jar）─────────────────────
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      # ── 4. 解析版本号（仅 tag 触发时有效）────────────────────────────────
      - name: Extract version from tag
        id: version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "name=$TAG" >> "$GITHUB_OUTPUT"
          # versionCode = major*10000 + minor*100 + patch，例如 1.2.3 → 10203
          IFS='.' read -r major minor patch <<< "$TAG"
          echo "code=$(( major*10000 + minor*100 + patch ))" >> "$GITHUB_OUTPUT"

      # ── 5. 非 tag 推送 / PR：编译 Debug APK（快速验证编译通过）──────────
      - name: Build Debug APK
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: gradle :app:assembleDebug

      - name: Upload Debug APK artifact
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      # ── 6. tag 推送：解码 Keystore → 编译 Release APK ────────────────────
      - name: Decode Keystore
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "${{ runner.temp }}/keystore.jks"

      - name: Build Release APK
        if: startsWith(github.ref, 'refs/tags/')
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_NAME: ${{ steps.version.outputs.name }}
          VERSION_CODE: ${{ steps.version.outputs.code }}
        run: gradle :app:assembleRelease

      # ── 7. 重命名 APK（含版本号，便于区分）──────────────────────────────
      - name: Rename APK
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/视频解析助手-${{ steps.version.outputs.name }}.apk

      # ── 8. 创建 GitHub Release 并上传 APK ────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "视频解析助手 v${{ steps.version.outputs.name }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/视频解析助手-${{ steps.version.outputs.name }}.apk
          body: |
            ## 下载安装

            👇 点击下方 APK 文件直接下载安装（Android 7.0+）

            ## 变更内容

            <!-- 以下由 GitHub 自动生成 -->
